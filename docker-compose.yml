services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutrio-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:80"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nutrio-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nutrio}:${POSTGRES_PASSWORD:-nutrio_dev_password}@db:5432/${POSTGRES_DB:-nutrio}?schema=public
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: nutrio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrio}
      POSTGRES_USER: ${POSTGRES_USER:-nutrio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrio_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nutrio-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@nutrio.app}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_dev_password}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"

volumes:
  postgres_data:
  pgadmin_data:
