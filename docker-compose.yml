services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutrio-frontend
    restart: unless-stopped
    ports:
      - "8080:80"

  db:
    image: postgres:16-alpine
    container_name: nutrio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrio}
      POSTGRES_USER: ${POSTGRES_USER:-nutrio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrio_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nutrio-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@nutrio.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_dev_password}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"

volumes:
  postgres_data:
  pgadmin_data:
