services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutrio-frontend
    restart: unless-stopped
    ports:
      - "8080:80"

  db:
    image: postgres:16-alpine
    container_name: nutrio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrio}
      POSTGRES_USER: ${POSTGRES_USER:-nutrio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrio_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: nutrio-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

volumes:
  postgres_data:
